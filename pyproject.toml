[project]
name = "reelforge"
version = "0.1.0"
description = "CLI tool to generate viral-ready reel segments from YouTube videos"
authors = [{name = "AutoGenerated"}]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "yt-dlp>=2024.3.10",
    "youtube-transcript-api>=0.6.2",
]

[project.scripts]
reelforge = "reelforge.cli:main"

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"
